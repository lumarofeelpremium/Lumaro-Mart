<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fallback redirect for Single Page Application in mobile/static environments
      (function() {
        var pathname = window.location.pathname;
        var hash = window.location.hash;
        if (pathname !== '/' && pathname !== '/index.html' && !hash) {
          window.location.replace('/' + window.location.search + '#' + pathname + window.location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
